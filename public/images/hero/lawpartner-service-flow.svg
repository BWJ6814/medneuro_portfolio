<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">AI 기반 법률 상담 플랫폼 LawPartner 서비스 흐름</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f1fb"/>
      <stop offset="100%" stop-color="#f4f8fd"/>
    </linearGradient>
    <pattern id="pat" width="140" height="140" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="28" r="1.2" fill="#0047AB" opacity="0.06"/>
      <circle cx="100" cy="80" r="1" fill="#0047AB" opacity="0.05"/>
    </pattern>
    <marker id="flowArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0047AB" opacity="0.5"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect width="1200" height="560" fill="url(#pat)"/>

  <text x="600" y="42" text-anchor="middle" font-family="system-ui, 'Malgun Gothic', sans-serif" font-size="24" font-weight="700" fill="#0047AB">AI 기반 법률 상담 플랫폼 LawPartner</text>
  <text x="600" y="68" text-anchor="middle" font-family="system-ui, 'Malgun Gothic', sans-serif" font-size="12.5" fill="#475569">질문 입력부터 변호사 매칭·후기까지 이어지는 서비스 흐름</text>

  <!-- 5×216px cards, 24px gaps: 24 + 5×216 + 4×24 = 1200 -->
  <g font-family="system-ui, 'Malgun Gothic', sans-serif">
    <g>
      <rect x="24" y="92" width="216" height="420" rx="14" fill="#fff" stroke="#0047AB" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="24" y="92" width="216" height="42" rx="14" fill="#0047AB" fill-opacity="0.1"/>
      <text x="132" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">① AI 채팅 상담</text>
      <text x="132" y="158" text-anchor="middle" font-size="11" fill="#334155">법률 상담 내용 입력</text>
      <text x="132" y="176" text-anchor="middle" font-size="11" fill="#334155">RAG·판례 기반 응답</text>
      <circle cx="132" cy="240" r="34" fill="#e0edfb" stroke="#0047AB" stroke-opacity="0.25"/>
      <text x="132" y="248" text-anchor="middle" font-size="26">💬</text>
    </g>
    <line x1="248" y1="302" x2="258" y2="302" stroke="#0047AB" stroke-width="2" opacity="0.4" marker-end="url(#flowArrow)"/>

    <g>
      <rect x="264" y="92" width="216" height="420" rx="14" fill="#fff" stroke="#0047AB" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="264" y="92" width="216" height="42" rx="14" fill="#0047AB" fill-opacity="0.1"/>
      <text x="372" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">② 상담게시글 자동 작성</text>
      <text x="372" y="158" text-anchor="middle" font-size="11" fill="#334155">채팅 맥락을 반영해</text>
      <text x="372" y="176" text-anchor="middle" font-size="11" fill="#334155">상담 요청 게시글 생성</text>
      <circle cx="372" cy="240" r="34" fill="#e0edfb" stroke="#0047AB" stroke-opacity="0.25"/>
      <text x="372" y="248" text-anchor="middle" font-size="26">📝</text>
    </g>
    <line x1="488" y1="302" x2="498" y2="302" stroke="#0047AB" stroke-width="2" opacity="0.4" marker-end="url(#flowArrow)"/>

    <g>
      <rect x="504" y="92" width="216" height="420" rx="14" fill="#fff" stroke="#0047AB" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="504" y="92" width="216" height="42" rx="14" fill="#0047AB" fill-opacity="0.1"/>
      <text x="612" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">③ 다수 변호사 답변</text>
      <text x="612" y="158" text-anchor="middle" font-size="11" fill="#334155">게시글에 변호사</text>
      <text x="612" y="176" text-anchor="middle" font-size="11" fill="#334155">댓글·답변 제공</text>
      <circle cx="612" cy="240" r="34" fill="#e0edfb" stroke="#0047AB" stroke-opacity="0.25"/>
      <text x="612" y="248" text-anchor="middle" font-size="26">⚖️</text>
    </g>
    <line x1="728" y1="302" x2="738" y2="302" stroke="#0047AB" stroke-width="2" opacity="0.4" marker-end="url(#flowArrow)"/>

    <g>
      <rect x="744" y="92" width="216" height="420" rx="14" fill="#fff" stroke="#0047AB" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="744" y="92" width="216" height="42" rx="14" fill="#0047AB" fill-opacity="0.1"/>
      <text x="852" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">④ 변호사 선택·1:1 요청</text>
      <text x="852" y="158" text-anchor="middle" font-size="11" fill="#334155">선호 변호사 선택 후</text>
      <text x="852" y="176" text-anchor="middle" font-size="11" fill="#334155">비공개 대화 요청</text>
      <circle cx="852" cy="240" r="34" fill="#e0edfb" stroke="#0047AB" stroke-opacity="0.25"/>
      <text x="852" y="248" text-anchor="middle" font-size="26">🤝</text>
    </g>
    <line x1="968" y1="302" x2="978" y2="302" stroke="#0047AB" stroke-width="2" opacity="0.4" marker-end="url(#flowArrow)"/>

    <g>
      <rect x="984" y="92" width="216" height="420" rx="14" fill="#fff" stroke="#0047AB" stroke-opacity="0.22" stroke-width="1.5"/>
      <rect x="984" y="92" width="216" height="42" rx="14" fill="#0047AB" fill-opacity="0.1"/>
      <text x="1092" y="120" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">⑤ 선임·후기</text>
      <text x="1092" y="158" text-anchor="middle" font-size="11" fill="#334155">1:1 상담 후</text>
      <text x="1092" y="176" text-anchor="middle" font-size="11" fill="#334155">선임·후기·문제 해결</text>
      <circle cx="1092" cy="240" r="34" fill="#e0edfb" stroke="#0047AB" stroke-opacity="0.25"/>
      <text x="1092" y="248" text-anchor="middle" font-size="26">⭐</text>
    </g>
  </g>
</svg>
